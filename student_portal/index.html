<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Portal - Profile Fetch</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Student Portal</h1>
      <p class="muted">This page demonstrates: Student Portal → Auth System → Adapter Layer → Legacy System → Student Profile.</p>
    </section>

    <section class="grid">
      <form id="registerForm" class="card">
        <h2>1. Register Student</h2>
        <input name="email" type="email" placeholder="Email" required />
        <input name="password" type="password" placeholder="Password" required />
        <input name="firstName" placeholder="First name" required />
        <input name="lastName" placeholder="Last name" required />
        <input name="dob" type="date" required />
        <input name="course" placeholder="Course, e.g. BSIT" required />
        <input name="major" placeholder="Major, e.g. Business Analytics" required />
        <input name="address" placeholder="Address" required />
        <select name="status" required>
          <option value="Regular">Regular</option>
          <option value="Irregular">Irregular</option>
        </select>
        <button type="submit">Register and Sync to Legacy</button>
      </form>

      <form id="loginForm" class="card">
        <h2>2. Login</h2>
        <input name="email" type="email" placeholder="Email" required />
        <input name="password" type="password" placeholder="Password" required />
        <button type="submit">Login</button>
        <button type="button" id="fetchMyProfile">Fetch My Profile</button>
      </form>
    </section>

    <section class="card">
      <h2>Alternative: Fetch by Legacy Student ID</h2>
      <div class="row">
        <input id="legacyStudentId" placeholder="Paste legacy student id here" />
        <button id="fetchById">Fetch Profile</button>
      </div>
    </section>

    <section class="card">
      <h2>Student Profile Display</h2>
      <pre id="output">Result will appear here.</pre>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
